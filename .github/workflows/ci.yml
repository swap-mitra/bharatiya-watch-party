# Realtime Protocol Spec

## Room Authority

- Host is authoritative for playback state
- Viewers may send presence, readiness, and chat events
- Viewer playback mutation attempts must be rejected

## Core Messages

### Client to Server

- Ping
- ReadyState
- ChatSend
- PlaybackCommand

### Server to Client

- Welcome
- Presence
- Chat
- Playback
- Error
- RoomClosed

## Ordering

- Playback commands carry a monotonic sequence number
- Consumers ignore stale sequence numbers
- Reconnect must preserve the last known session identity when the session token is valid

## Lifecycle

- Host creates room through HTTP
- Each participant establishes a WebSocket session with a previously issued session token
- Disconnect removes the participant from presence
- Host disconnect closes the room and broadcasts RoomClosed
